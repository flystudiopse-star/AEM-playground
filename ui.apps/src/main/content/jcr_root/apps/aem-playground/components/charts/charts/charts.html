<div class="chart-component" 
     data-chart-type="${properties.chartType @ context='html'}"
     data-chart-title="${properties.chartTitle @ context='html'}"
     data-manual-labels="${properties.chartLabels @ context='html'}"
     data-manual-values="${properties.chartValues @ context='html'}">
    
    <div class="chart-container" id="chart-${resource.name @ context='html'}"></div>
    
    <p class="chart-help" data-sly-test="${!properties.chartLabels && !properties.chartValues && !properties.csvFileReference}">
        Configure chart data in component dialog or upload CSV file.
    </p>
</div>

<script>
if (!window.chartComponentsInitialized) {
    window.chartComponentsInitialized = true;
    
    (function() {
        function loadHighcharts(callback) {
            if (window.Highcharts) {
                callback();
                return;
            }
            var script = document.createElement('script');
            script.src = 'https://code.highcharts.com/highcharts.js';
            script.onload = callback;
            document.head.appendChild(script);
        }
        
        function parseData(labelsStr, valuesStr) {
            var labels = labelsStr ? labelsStr.split(',').map(function(l) { return l.trim(); }) : [];
            var values = valuesStr ? valuesStr.split(',').map(function(v) { 
                var n = parseFloat(v.trim());
                return isNaN(n) ? 0 : n; 
            }) : [];
            return { labels: labels, values: values };
        }
        
        function renderCharts() {
            var components = document.querySelectorAll('.chart-component');
            components.forEach(function(el) {
                var type = el.getAttribute('data-chart-type') || 'line';
                var title = el.getAttribute('data-chart-title') || 'Chart';
                var labelsStr = el.getAttribute('data-manual-labels') || '';
                var valuesStr = el.getAttribute('data-manual-values') || '';
                
                var container = el.querySelector('.chart-container');
                if (!container) return;
                
                var data = parseData(labelsStr, valuesStr);
                
                if (data.labels.length === 0) return;
                
                var config = {
                    chart: { type: type === 'area' ? 'area' : type },
                    title: { text: title },
                    xAxis: { categories: data.labels },
                    yAxis: { title: { text: 'Value' } },
                    series: [{ name: title, data: data.values }],
                    credits: { enabled: false }
                };
                
                if (type === 'pie') {
                    config.series = [{
                        type: 'pie',
                        name: title,
                        data: data.labels.map(function(l, i) {
                            return [l, data.values[i]];
                        })
                    }];
                    delete config.xAxis;
                    delete config.yAxis;
                }
                
                Highcharts.chart(container.id, config);
            });
        }
        
        document.addEventListener('DOMContentLoaded', function() {
            loadHighcharts(renderCharts);
        });
    })();
}
</script>
