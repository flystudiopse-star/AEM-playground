name: Build AEM Project

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: 'maven'
        
    - name: Build with Maven
      run: |
        cd aem-playground
        mvn clean install -DskipTests
      
    - name: Upload artifacts
      uses: actions/upload-artifact@v4
      with:
        name: aem-packages
        path: |
          **/target/*.zip
          **/target/*.jar